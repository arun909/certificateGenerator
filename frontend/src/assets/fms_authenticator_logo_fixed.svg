  <!-- WORDMARK — two lines, centred vertically as a block -->
  <!-- "fms" — large, gradient -->
  <text x="182" y="68" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="52" font-weight="700" fill="url(#fmsGrad)" letter-spacing="-1" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, &quot;Helvetica Neue&quot;, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">fms</text>

  <!-- "Authenticator" — same x, below "fms", navy -->
  <text x="182" y="122" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="52" font-weight="700" fill="#1A237E" letter-spacing="-1" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, &quot;Helvetica Neue&quot;, sans-serif;font-size:52px;font-weight:700;text-anchor:start;dominant-baseline:auto">Authenticator</text>
</svg>