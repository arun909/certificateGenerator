<svg width="100%" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg" role="img" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">fmsAuthenticator logo</title>
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B44FE8"/>
      <stop offset="50%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
    <linearGradient id="fmsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C44FE8"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
  </defs>

